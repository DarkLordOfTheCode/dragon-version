<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>POKéMON DRAGON VERSION — Play</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />
<style>
  :root{
    --sky-top:#160d2e; --sky-mid:#3a1747;
    --gold:#ffd23f; --ember:#ff7a18; --crimson-dk:#8e1530;
    --box-line:#08294a; --amber:#ffce63; --amber-dim:#c9923a;
    --term-bg:#120a08;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{
    background:radial-gradient(circle at 50% 35%,#160a26,#05030c 75%);
    font-family:'VT323',monospace; color:#fff;
    display:flex; align-items:center; justify-content:center; min-height:100vh; padding:14px;
  }

  .device{
    position:relative; width:min(96vw,820px); height:min(94vh,860px);
    display:flex; flex-direction:column;
    border-radius:18px; padding:clamp(8px,1.8vw,18px);
    background:linear-gradient(150deg,#2a1138,#160a26 55%,#0c0618);
    box-shadow:0 0 0 2px #3a2150,0 0 0 6px #0a0414,0 30px 70px -20px #000,
      inset 0 2px 0 #5a3a82,inset 0 -6px 14px #000;
  }

  .titlebar{
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    padding:4px 6px 10px;
  }
  .titlebar .name{
    font-family:'Press Start 2P'; font-size:clamp(8px,1.9vw,13px);
    color:var(--gold); letter-spacing:1px;
    text-shadow:-2px 0 var(--box-line),2px 0 var(--box-line),0 -2px var(--box-line),0 2px var(--box-line);
  }
  .titlebar .acts{ display:flex; gap:6px; }
  .tbtn{
    font-family:'Press Start 2P'; font-size:9px; color:#fff; cursor:pointer;
    background:rgba(8,41,74,.65); border:2px solid #fff; border-radius:6px; padding:7px 8px;
  }
  .tbtn:hover{ background:var(--crimson-dk); }
  .tbtn.go{ background:var(--gold); color:var(--box-line); border-color:var(--box-line); }
  .tbtn.go:hover{ background:#fff; }

  /* the CRT screen */
  .screen{
    position:relative; flex:1; min-height:0; border-radius:8px; overflow:hidden;
    background:linear-gradient(var(--term-bg),#0a0605);
    box-shadow:inset 0 0 0 3px #000, inset 0 0 50px rgba(0,0,0,.7);
  }
  #term{
    position:absolute; inset:0; overflow-y:auto; padding:14px 16px;
    font-family:'VT323','DejaVu Sans Mono','Courier New',monospace;
    font-size:clamp(15px,2.5vw,21px); line-height:1.12;
    color:var(--amber);
    text-shadow:0 0 6px rgba(255,150,40,.35);
    white-space:pre-wrap; word-break:break-word;
    letter-spacing:.5px;
    scrollbar-width:thin; scrollbar-color:#6a3a1a #1a0e08;
  }
  #term::-webkit-scrollbar{ width:10px; }
  #term::-webkit-scrollbar-thumb{ background:#6a3a1a; border-radius:5px; }
  #term::-webkit-scrollbar-track{ background:#1a0e08; }
  #cursor{ display:inline-block; width:.55em; height:1em; background:var(--amber);
    vertical-align:bottom; animation:bl 1s steps(2) infinite; box-shadow:0 0 8px var(--amber); }
  @keyframes bl{ 50%{ opacity:0 } }

  .scan{ position:absolute; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0 2px,rgba(0,0,0,.22) 2px 3px);
    mix-blend-mode:multiply; }
  .scan.off{ display:none; }
  .vig{ position:absolute; inset:0; pointer-events:none; z-index:6; border-radius:8px;
    box-shadow:inset 0 0 70px 12px rgba(0,0,0,.6),inset 0 0 150px 40px rgba(40,8,0,.4); }

  /* input / controls */
  .controls{ padding:10px 4px 2px; }
  .inrow{ display:flex; gap:8px; align-items:stretch; }
  #inp{
    flex:1; font-family:'VT323',monospace; font-size:clamp(16px,3vw,22px);
    background:#120a08; color:var(--amber); border:2px solid var(--amber-dim);
    border-radius:8px; padding:8px 12px; outline:none; letter-spacing:1px;
  }
  #inp:focus{ border-color:var(--gold); box-shadow:0 0 0 2px rgba(255,210,63,.3); }
  .enter{
    font-family:'Press Start 2P'; font-size:11px; color:var(--box-line);
    background:var(--gold); border:2px solid var(--box-line); border-radius:8px;
    padding:0 16px; cursor:pointer; box-shadow:0 4px 0 #b88500;
  }
  .enter:active{ transform:translateY(3px); box-shadow:0 1px 0 #b88500; }

  .pad{ display:grid; grid-template-columns:repeat(8,1fr); gap:6px; margin-top:8px; }
  .key{
    font-family:'Press Start 2P'; font-size:11px; color:#fff; cursor:pointer;
    background:rgba(8,41,74,.6); border:2px solid #5a7aa8; border-radius:6px;
    padding:10px 0; text-align:center; user-select:none;
  }
  .key:hover{ background:var(--box-line); }
  .key:active{ transform:translateY(2px); }
  .key.wide{ grid-column:span 2; }
  .hint{ text-align:center; font-family:'Press Start 2P'; font-size:7px; color:#cdbff0;
    opacity:.7; margin-top:8px; }

  @media (max-width:560px){
    .pad{ grid-template-columns:repeat(6,1fr); }
  }
</style>
</head>
<body>
  <div class="device">
    <div class="titlebar">
      <div class="name">▸ DRAGON VERSION</div>
      <div class="acts">
        <button class="tbtn go" id="newBtn">NEW GAME</button>
        <button class="tbtn" id="debugBtn">DEBUG</button>
        <button class="tbtn" id="soundBtn">♪ OFF</button>
        <button class="tbtn" id="scanBtn">CRT</button>
      </div>
    </div>

    <div class="screen" id="screenEl">
      <div id="term"><span id="cursor"></span></div>
      <div class="scan" id="scan"></div>
      <div class="vig"></div>
    </div>

    <div class="controls">
      <div class="inrow">
        <input id="inp" type="text" autocomplete="off" autocapitalize="off"
               spellcheck="false" placeholder="type here, then ENTER..." />
        <button class="enter" id="enterBtn">ENTER&nbsp;(A)</button>
      </div>
      <div class="pad" id="pad"></div>
      <div class="hint">PRESS ENTER ON AN EMPTY LINE TO ADVANCE TEXT</div>
    </div>
  </div>

<script>
const $ = s => document.querySelector(s);
const term   = $('#term');
const cursor = $('#cursor');
const inp    = $('#inp');

/* ---------- output stream ---------- */
function b64ToUtf8(b){
  const bin = atob(b);
  const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
  return new TextDecoder('utf-8').decode(bytes);
}
function append(text){
  cursor.remove();
  term.appendChild(document.createTextNode(text));
  term.appendChild(cursor);
  term.scrollTop = term.scrollHeight;
}
function connect(){
  const es = new EventSource('/stream');
  es.onmessage = e => { append(b64ToUtf8(e.data)); if(soundOn) blip(); };
  es.onerror = () => {/* browser auto-reconnects */};
}

/* ---------- send input ---------- */
async function send(text){
  try { await fetch('/input', { method:'POST', body:text }); }
  catch(e){ /* ignore */ }
}
function submit(){
  send(inp.value + '\n');   // the pty echoes it back into the stream
  inp.value = '';
  inp.focus();
}
function restart(mode){
  term.textContent = '';
  term.appendChild(cursor);
  fetch('/restart?mode=' + mode, { method:'POST' });
  inp.focus();
}

/* ---------- keypad ---------- */
const KEYS = ['1','2','3','4','5','6','7','8','9','0','Y','N','SPC','⌫','CLR','ENT'];
const pad = $('#pad');
KEYS.forEach(k=>{
  const b = document.createElement('div');
  b.className = 'key' + (k==='ENT' ? ' wide' : '');
  b.textContent = k;
  b.addEventListener('click', ()=>{
    if(k==='ENT') submit();
    else if(k==='⌫') inp.value = inp.value.slice(0,-1);
    else if(k==='CLR') inp.value = '';
    else if(k==='SPC') inp.value += ' ';
    else inp.value += k;
    inp.focus();
  });
  pad.appendChild(b);
});

/* ---------- keyboard ---------- */
inp.addEventListener('keydown', e=>{
  if(e.key === 'Enter'){ e.preventDefault(); submit(); }
});
$('#enterBtn').addEventListener('click', submit);
$('#screenEl').addEventListener('click', ()=> inp.focus());

/* ---------- buttons ---------- */
$('#newBtn').addEventListener('click', ()=> restart('new'));
$('#debugBtn').addEventListener('click', ()=> restart('debug'));
$('#scanBtn').addEventListener('click', ()=>{
  const off = $('#scan').classList.toggle('off');
  $('#scanBtn').textContent = off ? 'FLAT' : 'CRT';
});

/* ---------- retro blip (throttled) ---------- */
let AC=null, soundOn=false, lastBlip=0;
function blip(){
  const now = performance.now();
  if(now - lastBlip < 55) return; lastBlip = now;
  try{
    if(!AC) AC = new (window.AudioContext||window.webkitAudioContext)();
    if(AC.state==='suspended') AC.resume();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='square'; o.frequency.value=1500;
    g.gain.setValueAtTime(0.0001,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.04,AC.currentTime+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+0.03);
    o.connect(g).connect(AC.destination); o.start(); o.stop(AC.currentTime+0.04);
  }catch(e){}
}
$('#soundBtn').addEventListener('click', ()=>{
  soundOn = !soundOn;
  $('#soundBtn').textContent = soundOn ? '♪ ON' : '♪ OFF';
  if(soundOn) blip();
});

/* ---------- go ---------- */
connect();
inp.focus();
</script>
</body>
</html>
